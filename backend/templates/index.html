<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Prediction</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white shadow-lg rounded-2xl p-8 w-96 text-center">

        <h1 class="text-2xl font-bold mb-6 text-gray-800">
            🚗 Car Price Prediction
        </h1>

        <form action="/predict-form" method="POST" class="space-y-4">

            <input type="number" name="year" placeholder="Enter Year"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>

            <input type="number" name="km" placeholder="KM Driven"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>

            <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Predict Price
            </button>

        </form>
        <a href="/history" class="text-blue-500 hover:underline">View History</a>

        {% if prediction %}
        <div class="mt-6 p-4 bg-green-100 text-green-800 rounded-lg">
            💰 Predicted Price: ₹{{ prediction }}
        </div>
        {% endif %}

    </div>

</body>
</html>
